name: SonarCloud
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: bw-output
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        with:
          args: >
            -Dsonar.scanner.skip=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Build Wrapperをダウンロードしてパスを通す（これが重要！）
      - name: Download and set up Build Wrapper
        run: |
          curl -sSLo build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o build-wrapper-linux-x86.zip
          echo "$(pwd)/build-wrapper-linux-x86" >> $GITHUB_PATH

      - name: Run Build Wrapper
        run: |
          # パスが通ったのでそのまま実行できるようになります
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} g++ main.cpp -o my_app

      - name: Run SonarScanner
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.build-wrapper-output="${{ env.BUILD_WRAPPER_OUT_DIR }}"
