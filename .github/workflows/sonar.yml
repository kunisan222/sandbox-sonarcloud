name: SonarCloud
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Build Wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o build-wrapper.zip
          echo "$(pwd)/build-wrapper-linux-x86" >> $GITHUB_PATH

      - name: Run Build Wrapper
        run: |
          # 以前失敗した可能性のあるキャッシュをクリアするため、明示的に clean な状態でビルド
          build-wrapper-linux-x86-64 --out-dir bw-output g++ "$GITHUB_WORKSPACE/main.cpp" -o my_app

      - name: Run SonarScanner
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kunisan222_sandbox-sonarcloud
            -Dsonar.organization=kunisan222
            -Dsonar.sources=.
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.python.version=3
            -Dsonar.lang.optimisticAnalysis=true
