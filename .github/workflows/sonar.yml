name: SonarCloud
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: bw-output
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Build WrapperとScannerをセットでインストールする最新の書き方
      - name: Install SonarCloud tools
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        with:
          # ここではインストールだけ行うのでアクション自体の実行はスキップ
          args: >
            -Dsonar.scanner.skip=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Build Wrapper
        run: |
          # g++でビルドする様子を記録
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} g++ main.cpp -o my_app

      - name: Run SonarScanner
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.build-wrapper-output="${{ env.BUILD_WRAPPER_OUT_DIR }}"
