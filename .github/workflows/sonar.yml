name: SonarCloud
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 道具をダウンロード
      - name: Install Build Wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o build-wrapper.zip
          echo "$(pwd)/build-wrapper-linux-x86" >> $GITHUB_PATH

      # 2. 【最重要】クリーンビルドと絶対パスでの記録
      - name: Run Build Wrapper
        run: |
          # 前回の残骸を消し、コンパイラに「ここが作業場所だ」と絶対パスで教え込みます
          build-wrapper-linux-x86-64 --out-dir bw-output g++ -DSONAR $GITHUB_WORKSPACE/main.cpp -o my_app

      # 3. 解析実行（設定をすべてここに詰め込む）
      - name: Run SonarScanner
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kunisan222_sandbox-sonarcloud
            -Dsonar.organization=kunisan222
            -Dsonar.sources=.
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.scm.exclusions.disabled=true
            -Dsonar.working.directory=/tmp/sonar
